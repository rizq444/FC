<style>
  :root {
    --bg: #000000;
    --fg: #ffffff;
    --muted: rgba(255, 255, 255, 0.65);
    --accent: #d4a24a;
    --accent-soft: #f1c97a;
    --accent-red: #c8341f;
    --card: rgba(255, 255, 255, 0.04);
    --card-border: rgba(255, 255, 255, 0.10);
    --card-hover: rgba(212, 162, 74, 0.14);
  }

- { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
margin: 0;
padding: 0;
background: var(–bg);
color: var(–fg);
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, sans-serif;
-webkit-font-smoothing: antialiased;
min-height: 100vh;
}

body {
background:
radial-gradient(1200px 600px at 50% -10%, rgba(212, 162, 74, 0.12), transparent 60%),
radial-gradient(800px 400px at 50% 110%, rgba(200, 52, 31, 0.08), transparent 60%),
var(–bg);
background-attachment: fixed;
}

.wrap {
max-width: 440px;
margin: 0 auto;
padding: 36px 22px 64px;
display: flex;
flex-direction: column;
align-items: center;
text-align: center;
}

.logo {
width: 240px;
height: 240px;
object-fit: contain;
margin-bottom: 22px;
filter: drop-shadow(0 18px 40px rgba(212, 162, 74, 0.25));
animation: fadeDown 0.7s ease both;
}

.name {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 34px;
letter-spacing: 0.08em;
margin: 0 0 6px;
background: linear-gradient(180deg, #ffffff 0%, var(–accent-soft) 100%);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
animation: fadeDown 0.8s 0.05s ease both;
}

.tagline {
font-size: 13px;
letter-spacing: 0.22em;
text-transform: uppercase;
color: var(–muted);
margin: 0 0 28px;
animation: fadeDown 0.8s 0.1s ease both;
}

.links {
width: 100%;
display: flex;
flex-direction: column;
gap: 12px;
}

.link {
display: flex;
align-items: center;
justify-content: center;
gap: 12px;
padding: 18px 20px;
background: var(–card);
border: 1px solid var(–card-border);
border-radius: 14px;
color: var(–fg);
text-decoration: none;
font-weight: 600;
font-size: 15px;
letter-spacing: 0.02em;
transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
backdrop-filter: blur(6px);
animation: fadeUp 0.6s ease both;
position: relative;
overflow: hidden;
}
.link:nth-child(1) { animation-delay: 0.15s; }
.link:nth-child(2) { animation-delay: 0.22s; }
.link:nth-child(3) { animation-delay: 0.29s; }

.link:hover, .link:active {
background: var(–card-hover);
border-color: rgba(212, 162, 74, 0.55);
transform: translateY(-2px);
}

.link svg {
width: 20px;
height: 20px;
flex-shrink: 0;
color: var(–accent);
}

footer {
margin-top: 40px;
font-size: 11px;
letter-spacing: 0.25em;
text-transform: uppercase;
color: rgba(255, 255, 255, 0.35);
}

@keyframes fadeDown {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}
</style>

</head>
<body>
  <main class="wrap">
    <img
      class="logo"
      src="frenchie-cartel-logo.png"
      alt="Frenchie Cartel NJ logo"
    />
