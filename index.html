<title>Frenchie Cartel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #000000;
    --fg: #ffffff;
    --muted: rgba(255, 255, 255, 0.70);
    --accent: #d4a24a;
    --accent-soft: #f1c97a;
    --accent-red: #c8341f;
    --card: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.14);
    --card-hover: rgba(212, 162, 74, 0.18);
  }

- { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
margin: 0;
padding: 0;
background: #000000;
color: #ffffff;
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, sans-serif;
-webkit-font-smoothing: antialiased;
min-height: 100vh;
}

body {
background:
radial-gradient(1200px 600px at 50% -10%, rgba(212, 162, 74, 0.14), transparent 60%),
radial-gradient(800px 400px at 50% 110%, rgba(200, 52, 31, 0.10), transparent 60%),
#000000;
background-attachment: fixed;
}

.wrap {
max-width: 440px;
margin: 0 auto;
padding: 40px 22px 64px;
display: flex;
flex-direction: column;
align-items: center;
text-align: center;
}

.logo {
width: 260px;
height: 260px;
object-fit: contain;
margin-bottom: 24px;
filter: drop-shadow(0 18px 40px rgba(212, 162, 74, 0.30));
animation: fadeDown 0.7s ease both;
}

.name {
font-family: ‘Anton’, ‘Bebas Neue’, sans-serif;
font-weight: 400;
font-size: 46px;
line-height: 1;
letter-spacing: 0.06em;
margin: 0 0 28px;
text-transform: uppercase;
background: linear-gradient(180deg, #ffffff 0%, #f1c97a 100%);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
text-shadow: 0 2px 24px rgba(212, 162, 74, 0.25);
animation: fadeDown 0.8s 0.05s ease both;
}

.links {
width: 100%;
display: flex;
flex-direction: column;
gap: 14px;
}

.link {
display: flex;
align-items: center;
justify-content: center;
gap: 12px;
padding: 18px 20px;
background: rgba(255, 255, 255, 0.06);
border: 1px solid rgba(255, 255, 255, 0.14);
border-radius: 14px;
color: #ffffff;
text-decoration: none;
font-weight: 600;
font-size: 16px;
letter-spacing: 0.02em;
transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
-webkit-backdrop-filter: blur(6px);
backdrop-filter: blur(6px);
animation: fadeUp 0.6s ease both;
}
.link:nth-of-type(1) { animation-delay: 0.15s; }
.link:nth-of-type(2) { animation-delay: 0.22s; }
.link:nth-of-type(3) { animation-delay: 0.29s; }

.link:hover, .link:active {
background: rgba(212, 162, 74, 0.18);
border-color: rgba(212, 162, 74, 0.6);
transform: translateY(-2px);
}

.link svg {
width: 22px;
height: 22px;
flex-shrink: 0;
color: #d4a24a;
}

footer {
margin-top: 44px;
font-size: 11px;
letter-spacing: 0.3em;
text-transform: uppercase;
color: rgba(255, 255, 255, 0.4);
}

@keyframes fadeDown {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}
</style>

</head>
<body>
  <main class="wrap">
    <img class="logo" src="frenchie-cartel-logo.png" alt="Frenchie Cartel logo" />
